<div class="min-h-screen bg-gray-50 font-sans flex flex-col">
  
  <header class="bg-primary px-4 md:px-8 py-3 md:py-4 flex justify-between items-center text-white shadow-md z-30">
    <div class="flex items-center gap-4">
      <button class="bg-white text-primary px-4 py-2 text-sm rounded-full font-extrabold shadow-sm hover:bg-gray-100 transition-colors flex items-center gap-2" (click)="regresar()">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/></svg>
        Volver
      </button>
      <h2 class="m-0 text-lg md:text-xl font-extrabold tracking-tight">Mi Perfil</h2>
    </div>
  </header>

  <div class="flex-1 p-4 md:p-8 flex justify-center items-start">
    <div class="w-full max-w-3xl bg-white rounded-2xl shadow-[0_4px_20px_rgb(0,0,0,0.04)] border border-gray-100 overflow-hidden">
      
      <div class="p-6 md:p-10">
        
        <!-- Avatar Section -->
        <div class="flex flex-col md:flex-row items-center md:items-start gap-6 mb-8 pb-8 border-b border-gray-100 text-center md:text-left">
          
          <div class="relative group cursor-pointer w-32 h-32 rounded-full overflow-hidden border-4 border-gray-50 shadow-md flex-shrink-0 bg-gray-100 flex items-center justify-center" (click)="triggerFileInput()">
            @if (usuario.avatarUrl) {
              <img [src]="usuario.avatarUrl" alt="Avatar" class="w-full h-full object-cover">
            } @else {
              <span class="text-4xl font-extrabold text-primary">{{ inicial }}</span>
            }
            <div class="absolute inset-0 bg-black/50 backdrop-blur-sm opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center text-white">
              <svg width="32" height="32" fill="currentColor" viewBox="0 0 16 16"><path d="M10.5 8.5a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/><path d="M2 4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1.172a2 2 0 0 1-1.414-.586l-.828-.828A2 2 0 0 0 9.172 2H6.828a2 2 0 0 0-1.414.586l-.828.828A2 2 0 0 1 3.172 4H2zm.5 2a.5.5 0 1 1 0-1 .5.5 0 0 1 0 1zm9 2.5a3.5 3.5 0 1 1-7 0 3.5 3.5 0 0 1 7 0z"/></svg>
            </div>
            <input type="file" id="imageUpload" accept="image/png, image/jpeg, image/gif" class="hidden" (change)="onFileSelected($event)">
          </div>

          <div class="flex-1 mt-2">
            <strong class="block text-primary text-lg font-extrabold mb-1">Fotografía de Perfil</strong>
            <p class="text-sm text-gray-500 font-medium m-0">Haz clic sobre la imagen actual para subir una nueva fotografía. Recomendamos usar una imagen cuadrada con tu rostro visible.</p>
          </div>
        </div>

        <!-- Form Section -->
        <h3 class="text-primary font-extrabold text-lg mb-6">Datos Personales</h3>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          
          <div>
            <label class="block text-sm font-extrabold text-gray-700 mb-2">Nombre <span class="text-secondary">*</span></label>
            <input type="text" [(ngModel)]="usuario.nombre" class="w-full px-4 py-3 border border-gray-200 bg-gray-50 rounded-xl text-sm text-gray-800 outline-none transition-all focus:border-primary focus:ring-4 focus:ring-primary/10 focus:bg-white font-medium">
          </div>

          <div>
            <label class="block text-sm font-extrabold text-gray-700 mb-2">Apellido(s) <span class="text-secondary">*</span></label>
            <input type="text" [(ngModel)]="usuario.apellido" class="w-full px-4 py-3 border border-gray-200 bg-gray-50 rounded-xl text-sm text-gray-800 outline-none transition-all focus:border-primary focus:ring-4 focus:ring-primary/10 focus:bg-white font-medium">
          </div>

          <div>
            <label class="block text-sm font-extrabold text-gray-700 mb-2">Fecha de nacimiento</label>
            <input type="date" [(ngModel)]="usuario.fecha_nac" class="w-full px-4 py-3 border border-gray-200 bg-gray-50 rounded-xl text-sm text-gray-800 outline-none transition-all focus:border-primary focus:ring-4 focus:ring-primary/10 focus:bg-white font-medium">
          </div>

          <div class="flex items-end">
            <button class="w-full bg-primary hover:bg-[#1a2352] text-white px-6 py-3 rounded-xl font-extrabold shadow-[0_4px_15px_rgba(39,51,118,0.25)] transition-all transform hover:-translate-y-0.5" (click)="guardarCambios()">
                Guardar Cambios
            </button>
          </div>

        </div>

      </div>
    </div>
  </div>
</div>
