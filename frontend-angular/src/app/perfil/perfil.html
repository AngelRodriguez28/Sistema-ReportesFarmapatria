<div class="panel-layout" style="min-height: 100vh; background-color: var(--color-bg); display: flex; flex-direction: column;">
  
  <header class="panel-header">
    <div style="display: flex; align-items: center; gap: 15px;">
      <button class="ui-button" style="background: white; color: var(--color-primary); padding: 8px 15px; width: auto; font-size: 14px; font-weight: 800;" (click)="regresar()">← Volver al Panel</button>
      <h2 style="margin: 0; font-size: 20px; font-weight: 800; color: white;">Mi Perfil</h2>
    </div>
  </header>

  <div class="panel-wrapper" style="flex: 1;">
    <div class="panel-container" style="max-width: 800px; margin-top: 20px;">
      
      <div class="panel-card">
        
        <!-- Avatar Section -->
        <div style="display: flex; align-items: center; gap: 30px; margin-bottom: 30px; flex-wrap: wrap; padding-bottom: 25px; border-bottom: 2px solid #e1e5eb;">
          <div style="display: flex; flex-direction: column;">
            <strong style="color: var(--color-primary); font-size: 16px;">Imagen de perfil</strong>
            <span style="color: #888; font-size: 13px;">Haz clic sobre la imagen para seleccionar una nueva</span>
          </div>
          
          <div class="avatar-editable" (click)="triggerFileInput()">
            @if (usuario.avatarUrl) {
              <img [src]="usuario.avatarUrl" alt="Avatar" style="width: 100%; height: 100%; object-fit: cover; object-position: center;">
            } @else {
              <span>{{ inicial }}</span>
            }
            <div class="avatar-overlay">
              <svg width="32" height="32" fill="currentColor" viewBox="0 0 16 16"><path d="M10.5 8.5a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/><path d="M2 4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1.172a2 2 0 0 1-1.414-.586l-.828-.828A2 2 0 0 0 9.172 2H6.828a2 2 0 0 0-1.414.586l-.828.828A2 2 0 0 1 3.172 4H2zm.5 2a.5.5 0 1 1 0-1 .5.5 0 0 1 0 1zm9 2.5a3.5 3.5 0 1 1-7 0 3.5 3.5 0 0 1 7 0z"/></svg>
            </div>
            <input type="file" id="imageUpload" accept="image/png, image/jpeg, image/gif" style="display: none;" (change)="onFileSelected($event)">
          </div>
        </div>

        <!-- Form Section -->
        <h3 style="color: var(--color-primary); font-weight: 800; margin-bottom: 20px;">Datos Personales</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
          
          <!-- Nombre -->
          <div class="input-group">
            <label style="display: block; margin-bottom: 5px; font-size: 13px; font-weight: 700; color: #444;">Nombre <span style="color: var(--color-secondary);">*</span></label>
            <input type="text" [(ngModel)]="usuario.nombre" class="ui-input">
          </div>

          <!-- Apellido -->
          <div class="input-group">
            <label style="display: block; margin-bottom: 5px; font-size: 13px; font-weight: 700; color: #444;">Apellido(s) <span style="color: var(--color-secondary);">*</span></label>
            <input type="text" [(ngModel)]="usuario.apellido" class="ui-input">
          </div>

          <!-- Fecha Nacimiento -->
          <div class="input-group">
            <label style="display: block; margin-bottom: 5px; font-size: 13px; font-weight: 700; color: #444;">Fecha de nacimiento</label>
            <input type="date" [(ngModel)]="usuario.fecha_nac" class="ui-input">
          </div>

          <!-- Guardar Cambios -->
          <div class="input-group" style="display: flex; align-items: flex-end;">
            <button class="ui-button btn-login" style="margin-top: auto;" (click)="guardarCambios()">Guardar cambios</button>
          </div>

        </div>

      </div>

    </div>
  </div>
</div>
