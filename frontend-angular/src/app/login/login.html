<div class="auth-wrapper">
    
    <!-- Left panel: Branding Banner -->
    <div class="auth-banner">
        <img src="logo.png" alt="Logo Farmapatria">
        <h1>Bienvenidos a Farmapatria</h1>
        <p>Plataforma Logística y de Gestión Global</p>
    </div>

    <!-- Right panel: Login Form -->
    <div class="auth-side">
        <div class="auth-card">
            <div class="auth-content">
                <div class="auth-header">
                    <h2>Iniciar Sesión</h2>
                    <p>Acceso a la plataforma</p>
                </div>

                <form (ngSubmit)="iniciarSesion()">
                    <div class="input-group">
                        <input type="email" [(ngModel)]="credenciales.email" name="email" required placeholder="Usuario o Correo" class="ui-input">
                    </div>

                    <div class="input-group">
                        <input type="password" [(ngModel)]="credenciales.password" name="password" required placeholder="Contraseña" class="ui-input">
                    </div>

                    <div class="remember-me" style="display: flex; justify-content: space-between; align-items: center;">
                        <label>
                            <input type="checkbox"> Recordarme
                        </label>
                        <a routerLink="/recuperar-contrasena" style="background:none; border:none; color:inherit; font-size:14px; cursor:pointer; text-decoration:underline; padding:0;">¿Olvidó Contraseña?</a>
                    </div>

                    <button type="submit" class="ui-button btn-login">
                        Iniciar sesión
                    </button>

                    <div class="auth-footer">
                        <p>¿No tienes una cuenta? <a routerLink="/registro">Regístrate</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>
